<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduGarden Admin Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#2E7D32;--green-light:#4CAF50;--green-lighter:#E8F5E9;--green-dark:#1B5E20;--white:#FFF;--gray-50:#FAFAFA;--gray-100:#F5F5F5;--gray-200:#EEE;--gray-300:#E0E0E0;--gray-400:#BDBDBD;--gray-500:#9E9E9E;--gray-600:#757575;--gray-700:#616161;--gray-800:#424242;--gray-900:#212121;--red:#D32F2F;--blue:#1976D2;--sidebar-width:240px;--header-height:64px;--radius:8px;--shadow:0 2px 8px rgba(0,0,0,0.08);--shadow-lg:0 4px 24px rgba(0,0,0,0.12);--transition:0.2s ease}
    html,body{height:100%}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;background:var(--gray-100);color:var(--gray-900);line-height:1.5}
    #loginScreen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--green-dark),var(--green) 50%,var(--green-light))}
    #loginScreen.hidden{display:none}
    .login-card{background:var(--white);border-radius:16px;padding:40px;width:380px;max-width:90vw;box-shadow:var(--shadow-lg);text-align:center}
    .login-card h1{font-size:1.5rem;color:var(--green);margin-bottom:4px}
    .login-card p{color:var(--gray-600);font-size:.875rem;margin-bottom:24px}
    .login-logo{width:64px;height:64px;margin-bottom:16px;border-radius:50%}
    .login-card input{width:100%;padding:12px 16px;border:2px solid var(--gray-300);border-radius:var(--radius);font-size:1rem;outline:none;transition:border-color var(--transition);margin-bottom:16px}
    .login-card input:focus{border-color:var(--green)}
    .login-card .btn{width:100%}
    .login-error{color:var(--red);font-size:.85rem;margin-bottom:12px;display:none}
    .login-error.show{display:block}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border:none;border-radius:var(--radius);font-size:.9rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .btn-primary{background:var(--green);color:var(--white)}
    .btn-primary:hover:not(:disabled){background:var(--green-dark)}
    .btn-danger{background:var(--red);color:var(--white)}
    .btn-danger:hover:not(:disabled){background:#B71C1C}
    .btn-secondary{background:var(--gray-200);color:var(--gray-800)}
    .btn-secondary:hover:not(:disabled){background:var(--gray-300)}
    .btn-sm{padding:6px 12px;font-size:.8rem}
    .btn-icon{width:36px;height:36px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;border:none;cursor:pointer;transition:all var(--transition)}
    .btn-icon:hover{background:var(--gray-300)}
    #app{display:flex;height:100vh}
    #app.hidden{display:none}
    .sidebar{width:var(--sidebar-width);background:var(--green-dark);color:var(--white);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
    .sidebar-brand{padding:20px;font-size:1.2rem;font-weight:700;border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:10px}
    .sidebar-brand img{width:32px;height:32px;border-radius:50%}
    .sidebar-nav{flex:1;padding:8px 0}
    .sidebar-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:background var(--transition);border:none;background:none;color:rgba(255,255,255,0.8);width:100%;text-align:left;font-size:.9rem}
    .sidebar-item:hover{background:rgba(255,255,255,0.08);color:var(--white)}
    .sidebar-item.active{background:rgba(255,255,255,0.15);color:var(--white);font-weight:600}
    .sidebar-item .icon{font-size:1.2rem;width:24px;text-align:center}
    .sidebar-item .badge{margin-left:auto;background:var(--red);color:white;font-size:.7rem;padding:2px 6px;border-radius:10px;font-weight:700}
    .sidebar-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,0.1)}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .header{height:var(--header-height);background:var(--white);border-bottom:1px solid var(--gray-300);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
    .header h2{font-size:1.25rem;color:var(--gray-800)}
    .header-actions{display:flex;align-items:center;gap:12px}
    .content{flex:1;padding:24px;overflow-y:auto}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px}
    .card-header{padding:16px 20px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
    .card-body{padding:20px}
    .grid-list{display:grid;gap:16px}
    .grid-2{grid-template-columns:repeat(2,1fr)}
    .grid-3{grid-template-columns:repeat(3,1fr)}
    .grid-4{grid-template-columns:repeat(4,1fr)}
    .item-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:transform var(--transition),box-shadow var(--transition)}
    .item-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
    .item-card img{width:100%;height:160px;object-fit:cover}
    .item-card .body{padding:12px 16px}
    .item-card .body h4{font-size:.95rem;margin-bottom:4px}
    .item-card .body p{font-size:.8rem;color:var(--gray-600)}
    .item-card .actions{display:flex;gap:8px;padding:8px 16px 12px;justify-content:flex-end}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:.85rem;font-weight:600;color:var(--gray-700);margin-bottom:4px}
    .form-group label .required{color:var(--red)}
    .form-control{width:100%;padding:10px 14px;border:2px solid var(--gray-300);border-radius:var(--radius);font-size:.9rem;outline:none;transition:border-color var(--transition);font-family:inherit}
    .form-control:focus{border-color:var(--green)}
    textarea.form-control{min-height:100px;resize:vertical}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
    .modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity var(--transition)}
    .modal-overlay.active{opacity:1;pointer-events:all}
    .modal{background:var(--white);border-radius:12px;padding:0;width:600px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
    .modal-header{padding:16px 20px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
    .modal-header h3{font-size:1.1rem}
    .modal-body{padding:20px}
    #toastContainer{position:fixed;top:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:8px}
    .toast{padding:12px 20px;border-radius:var(--radius);color:var(--white);font-size:.9rem;font-weight:500;box-shadow:var(--shadow-lg);animation:slideIn .3s ease;max-width:360px}
    .toast.success{background:var(--green)}.toast.error{background:var(--red)}.toast.info{background:var(--blue)}
    @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
    .confirm-dialog{text-align:center;padding:20px}
    .confirm-dialog .icon{font-size:3rem;margin-bottom:12px}
    .confirm-dialog h3{font-size:1.1rem;margin-bottom:8px}
    .confirm-dialog p{color:var(--gray-600);font-size:.9rem;margin-bottom:20px}
    .confirm-dialog .actions{display:flex;gap:12px;justify-content:center}
    .empty-state{text-align:center;padding:40px 20px;color:var(--gray-500)}
    .empty-state .icon{font-size:3rem;margin-bottom:8px}.empty-state p{font-size:.95rem}
    .spinner{width:40px;height:40px;border:4px solid var(--gray-300);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto}
    .spinner-sm{width:18px;height:18px;border-width:2px;margin:0}
    .btn .spinner-sm{display:none}.btn.loading .spinner-sm{display:inline-block}.btn.loading .btn-text{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .file-upload{border:2px dashed var(--gray-400);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all var(--transition)}
    .file-upload:hover{border-color:var(--green);background:var(--green-lighter)}
    .file-upload.has-image{border-style:solid;border-color:var(--green)}
    .file-upload img{max-width:200px;max-height:150px;border-radius:4px;margin-top:8px}
    .file-upload .placeholder{color:var(--gray-500);font-size:.85rem}.file-upload input[type="file"]{display:none}
    .message-item{padding:16px;border-bottom:1px solid var(--gray-200);cursor:pointer;transition:background var(--transition)}
    .message-item:hover{background:var(--gray-50)}
    .message-item.unread{background:#E3F2FD;border-left:3px solid var(--blue)}
    .message-item .msg-header{display:flex;justify-content:space-between;margin-bottom:4px}
    .message-item .msg-name{font-weight:600;font-size:.95rem}
    .message-item .msg-date{font-size:.8rem;color:var(--gray-500)}
    .message-item .msg-preview{font-size:.85rem;color:var(--gray-600);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .message-item .msg-full{display:none;margin-top:12px;padding:12px;background:var(--gray-50);border-radius:var(--radius);font-size:.9rem;white-space:pre-wrap;line-height:1.6}
    .message-item.expanded .msg-full{display:block}
    .message-item .msg-actions{margin-top:8px;display:flex;gap:8px}
    .knowledge-textarea{min-height:500px;resize:vertical}
    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .settings-section{margin-bottom:24px}
    .settings-section h4{font-size:.95rem;color:var(--gray-700);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--gray-200)}
    .last-updated{font-size:.8rem;color:var(--gray-500);margin-top:8px}
    @media(max-width:768px){.sidebar{width:60px}.sidebar-item span:not(.icon){display:none}.sidebar-brand span{display:none}.form-row{grid-template-columns:1fr}.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.settings-grid{grid-template-columns:1fr}.header h2{font-size:1rem}.content{padding:16px}}
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--gray-400);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--gray-500)}
    .staff-dragging{opacity:.5}.staff-drag-over{border-top:3px solid var(--green)}
    .role-order-panel{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:24px;border:1px solid var(--gray-200)}
    .role-order-panel h3{font-size:1rem;font-weight:700;color:var(--gray-800);margin-bottom:12px}
.role-order-list{display:flex;flex-direction:column;gap:8px}
.role-order-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius);cursor:grab;user-select:none;transition:background var(--transition),border-color var(--transition)}
.role-order-item:active{cursor:grabbing}
.role-order-item:hover{background:var(--gray-100)}
.role-order-item.dragging{opacity:0.4;background:var(--gray-200)}
.role-order-item.drag-over{border-top:3px solid var(--green)}
.role-drag-handle{font-size:1.25rem;color:var(--gray-500);line-height:1;flex-shrink:0;cursor:grab}
.role-order-label{font-weight:600;color:var(--gray-800);flex:1}
    .staff-role-selector-wrapper{display:flex;flex-direction:column;gap:8px}
    .staff-role-chips{display:flex;flex-wrap:wrap;gap:6px}
    .staff-role-chip{display:inline-flex;align-items:center;gap:6px;padding:3px 6px 3px 10px;border-radius:12px;font-size:.8rem;font-weight:600;line-height:1.5}
    .staff-role-chip-remove{background:none;border:none;font-size:1rem;cursor:pointer;padding:0;line-height:1;opacity:0.7;display:flex;align-items:center;color:inherit;margin-left:2px}
    .staff-role-chip-remove:hover{opacity:1}
    .staff-role-add-select{margin-top:2px;font-size:.85rem}
  </style>
</head>
<body>
<div id="loginScreen">
  <div class="login-card">
    <img class="login-logo" src="https://i.postimg.cc/Lsww5VsK/photoshop-project34c213.png" alt="EduGarden">
    <h1>EduGarden Admin</h1>
    <p>Sign in to access the dashboard</p>
    <div class="login-error" id="loginError">Invalid email or password</div>
    <input type="email" id="loginEmail" placeholder="Email address" autofocus>
    <input type="password" id="loginPassword" placeholder="Password">
    <button class="btn btn-primary" id="loginBtn">Sign In</button>

  </div>
</div>
<div id="dashboardRoot"></div>
<script>
const { createClient } = supabase;
const supabaseClient = createClient('https://exoyfpqfgixofsuginxx.supabase.co', 'sb_publishable_UExfTnoTaFgieljt6oiZ8Q_m0f2raxy');

let currentSection = 'articles';
let currentAction = null;
let currentEditId = null;
let confirmCallback = null;
let unreadCount = 0;
let currentSelectedFile = null;
let contentImagesList = [];
let originalBannerUrl = '';
let allStaffMembers = [];
let allRolesLibrary = [];
let staffSelectedRoleIds = [];
let dashboardInjected = false;
let roleDragSrcId = null;
var sectionNames = { articles:'Articles', roses:'Rose Catalog', adr_roses:'ADR Roses', roles:'Roles', staff:'Staff', team_photos:'Team Photos', messages:'Messages', chatbot:'Chatbot Knowledge', settings:'Site Settings' };

document.getElementById('loginBtn').addEventListener('click', handleLogin);
document.getElementById('loginEmail').addEventListener('keydown', function(e) { if (e.key === 'Enter') { document.getElementById('loginPassword').focus(); } });
document.getElementById('loginPassword').addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });

// ---- Dynamic dashboard injection (only after auth) ----
function injectDashboard() {
  if (dashboardInjected) return;
  dashboardInjected = true;
  var root = document.getElementById('dashboardRoot');
  root.innerHTML = '<div id="app">' +
    '<nav class="sidebar">' +
      '<div class="sidebar-brand">' +
        '<img src="https://i.postimg.cc/Lsww5VsK/photoshop-project34c213.png" alt="Logo"><span>EduGarden</span>' +
      '</div>' +
      '<div class="sidebar-nav">' +
        '<button class="sidebar-item active" data-section="articles"><span class="icon">&#x1F4DD;</span><span>Articles</span></button>' +
        '<button class="sidebar-item" data-section="roses"><span class="icon">&#x1F339;</span><span>Rose Catalog</span></button>' +
        '<button class="sidebar-item" data-section="adr_roses"><span class="icon">&#x1F339;</span><span>ADR Roses</span></button>' +
        '<button class="sidebar-item" data-section="roles"><span class="icon">&#x1F3F7;&#xFE0F;</span><span>Roles</span></button>' +
        '<button class="sidebar-item" data-section="staff"><span class="icon">&#x1F465;</span><span>Staff</span></button>' +
        '<button class="sidebar-item" data-section="team_photos"><span class="icon">&#x1F4F8;</span><span>Team Photos</span></button>' +
        '<button class="sidebar-item" data-section="messages"><span class="icon">&#x2709;&#xFE0F;</span><span>Messages</span><span class="badge" id="unreadBadge" style="display:none">0</span></button>' +
        '<button class="sidebar-item" data-section="chatbot"><span class="icon">&#x1F916;</span><span>Chatbot Knowledge</span></button>' +
        '<button class="sidebar-item" data-section="settings"><span class="icon">&#x2699;&#xFE0F;</span><span>Site Settings</span></button>' +
      '</div>' +
      '<div class="sidebar-footer">' +
        '<button class="btn btn-sm btn-secondary" id="logoutBtnSidebar" style="width:100%">&#x1F6AA; Logout</button>' +
      '</div>' +
    '</nav>' +
    '<div class="main">' +
      '<header class="header">' +
        '<h2 id="sectionTitle">Articles</h2>' +
        '<div class="header-actions">' +
          '<button class="btn btn-primary btn-sm" id="sectionActionBtn">+ Add New</button>' +
          '<button class="btn btn-icon" id="logoutBtnHeader" title="Logout">&#x1F6AA;</button>' +
        '</div>' +
      '</header>' +
      '<div class="content" id="sectionContent"><div class="spinner"></div></div>' +
    '</div>' +
  '</div>' +
  '<div class="modal-overlay" id="modalOverlay">' +
    '<div class="modal">' +
      '<div class="modal-header"><h3 id="modalTitle">Modal</h3><button class="btn-icon" id="closeModalBtn">&times;</button></div>' +
      '<div class="modal-body" id="modalBody"></div>' +
    '</div>' +
  '</div>' +
  '<div class="modal-overlay" id="confirmOverlay">' +
    '<div class="modal" style="width:420px">' +
      '<div class="modal-body">' +
        '<div class="confirm-dialog">' +
          '<div class="icon">&#x26A0;&#xFE0F;</div>' +
          '<h3 id="confirmTitle">Are you sure?</h3>' +
          '<p id="confirmMessage">This action cannot be undone.</p>' +
          '<div class="actions">' +
            '<button class="btn btn-secondary" id="confirmCancelBtn">Cancel</button>' +
            '<button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>' +
  '<div id="toastContainer"></div>';

  // Bind event listeners to injected elements
  document.getElementById('logoutBtnSidebar').addEventListener('click', handleLogout);
  document.getElementById('logoutBtnHeader').addEventListener('click', handleLogout);
  document.getElementById('closeModalBtn').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
  document.getElementById('confirmOverlay').addEventListener('click', function(e) { if (e.target === this) closeConfirm(); });
  document.getElementById('confirmCancelBtn').addEventListener('click', closeConfirm);
  document.getElementById('confirmDeleteBtn').addEventListener('click', executeConfirm);
  document.getElementById('sectionActionBtn').addEventListener('click', handleSectionAction);
  document.querySelectorAll('.sidebar-item').forEach(function(el) { el.addEventListener('click', function() { switchSection(this.dataset.section); }); });
}

function teardownDashboard() {
  var root = document.getElementById('dashboardRoot');
  root.innerHTML = '';
  dashboardInjected = false;
  currentSection = 'articles';
}

function showDashboard() {
  injectDashboard();
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').style.display = '';
}

function hideDashboard() {
  teardownDashboard();
  document.getElementById('loginScreen').classList.remove('hidden');
}

async function handleLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var pw = document.getElementById('loginPassword').value;
  var err = document.getElementById('loginError');
  var btn = document.getElementById('loginBtn');
  if (!email || !pw) { err.textContent = 'Please enter email and password'; err.classList.add('show'); return; }
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    var result = await supabaseClient.auth.signInWithPassword({ email: email, password: pw });
    if (result.error) {
      err.textContent = 'Invalid email or password';
      err.classList.add('show');
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginPassword').focus();
    } else {
      err.classList.remove('show');
      showDashboard();
      initApp();
    }
  } catch(e) {
    err.textContent = 'Login failed: ' + e.message;
    err.classList.add('show');
  }
  btn.disabled = false; btn.textContent = 'Sign In';
}
async function handleLogout() {
  await supabaseClient.auth.signOut();
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').classList.remove('show');
  hideDashboard();
}

// Check for existing session on page load
(async function checkSession() {
  try {
    var result = await supabaseClient.auth.getSession();
    if (result.data && result.data.session) {
      showDashboard();
      initApp();
    }
  } catch(e) { /* no session, stay on login */ }
})();

// Listen for auth state changes (e.g. token expiry)
supabaseClient.auth.onAuthStateChange(function(event, session) {
  if (event === 'SIGNED_OUT' || (!session && event === 'TOKEN_REFRESHED')) {
    hideDashboard();
  }
});
function showToast(message, type) {
  if (!type) type = 'success';
  var c = document.getElementById('toastContainer');
  if (!c) return;
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = message;
  c.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(function() { t.remove(); }, 300); }, 3000);
}
function openModal(title) { document.getElementById('modalTitle').textContent = title; document.getElementById('modalOverlay').classList.add('active'); }
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('modalBody').innerHTML = '';
  currentAction = null; currentEditId = null; currentSelectedFile = null;
}
function showConfirm(title, message, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  confirmCallback = callback;
  document.getElementById('confirmOverlay').classList.add('active');
}
function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('active'); confirmCallback = null; }
function executeConfirm() { if (confirmCallback) confirmCallback(); closeConfirm(); }

function switchSection(section) {
  currentSection = section;
  document.querySelectorAll('.sidebar-item').forEach(function(el) { el.classList.toggle('active', el.dataset.section === section); });
  document.getElementById('sectionTitle').textContent = sectionNames[section];
  var actionBtn = document.getElementById('sectionActionBtn');
  if (section === 'messages' || section === 'chatbot' || section === 'settings') { actionBtn.style.display = 'none'; }
  else { actionBtn.style.display = 'inline-flex'; actionBtn.textContent = section === 'team_photos' ? '+ Upload Photo' : '+ Add New'; }
  renderSection(section);
}
function handleSectionAction() {
  if (currentSection === 'articles') showArticleForm();
  else if (currentSection === 'roses') srf();
  else if (currentSection === 'adr_roses') sadrf();
  else if (currentSection === 'roles') showRoleForm();
  else if (currentSection === 'staff') ssf();
  else if (currentSection === 'team_photos') stpf();
}


function createFileUpload(currentUrl, onFileSelect) {
  var wrapper = document.createElement('div');
  wrapper.className = 'file-upload' + (currentUrl ? ' has-image' : '');
  if (currentUrl) { wrapper.innerHTML = '<img src="' + currentUrl + '" alt="preview"><p style="font-size:0.8rem;color:var(--gray-500);margin-top:4px;">Click to change</p>'; }
  else { wrapper.innerHTML = '<div class="placeholder">Click to upload image</div>'; }
  var input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = function(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) { wrapper.innerHTML = '<img src="' + ev.target.result + '" alt="preview"><p style="font-size:0.8rem;color:var(--gray-500);margin-top:4px;">Click to change</p>'; wrapper.classList.add('has-image'); };

async function uploadImage(file) {
  if (!file) return null;
  var ext = file.name.split('.').pop();
  var fileName = Date.now() + '_' + Math.random().toString(36).substring(2, 8) + '.' + ext;
  var result = await supabaseClient.storage.from('images').upload(fileName, file);
  if (result.error) { showToast('Upload failed: ' + result.error.message, 'error'); return null; }
  return 'https://exoyfpqfgixofsuginxx.supabase.co/storage/v1/object/public/images/' + fileName;
}
async function deleteImage(url) {
  if (!url) return;
  var prefix = 'https://exoyfpqfgixofsuginxx.supabase.co/storage/v1/object/public/images/';
  if (url.indexOf(prefix) !== 0) return;
  var path = url.substring(prefix.length);
  await supabaseClient.storage.from('images').remove([path]);
}

async function saveArticle() {
  var te = (document.getElementById('ate') || document.getElementById('article_title_en')).value.trim();
  var tg = (document.getElementById('atg') || document.getElementById('article_title_ge')).value.trim();
  var ce = (document.getElementById('ace') || document.getElementById('article_content_en')).value.trim();
  var cg = (document.getElementById('acg') || document.getElementById('article_content_ge')).value.trim();
  if (!te || !tg || !ce || !cg) { st('Fill all required fields', 'error'); return; }
  
  var btn = document.getElementById('articleSaveBtn');
  setL(btn, true);
  try {
    var bannerUrl = originalBannerUrl;
    if (currentSelectedFile) {
      bannerUrl = await ui(currentSelectedFile);
      if (!bannerUrl) { setL(btn, false); return; }
    }
    
    var contentUrls = [];
    for (var i = 0; i < contentImagesList.length; i++) {
      var item = contentImagesList[i];
      if (item.type === 'url') {
        contentUrls.push(item.value);
      } else if (item.type === 'file') {
        var uploadedUrl = await ui(item.value);
        if (uploadedUrl) {
          contentUrls.push(uploadedUrl);
        } else {
          setL(btn, false);
          return;
        }
      }
    }
    
    var allImages = [];
    if (bannerUrl) allImages.push(bannerUrl);
    allImages = allImages.concat(contentUrls);
    
    var d = {
      title_en: te,
      title_ge: tg,
      content_en: ce,
      content_ge: cg,
      image_url: allImages.join(',')
    };
    
    var r;
    if (currentAction === 'add') { r = await supabaseClient.from('articles').insert(d); }
    else { r = await supabaseClient.from('articles').update(d).eq('id', currentEditId); }
    if (r.error) { st('Error: ' + r.error.message, 'error'); }
    else { st(currentAction === 'add' ? 'Created!' : 'Updated!'); cm(); rs('articles'); }
  } catch(e) { st('Error: ' + e.message, 'error'); }
  setL(btn, false);
}

function escHtmlAttr(val) {
  return (val || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function formatRoleLabelAdmin(role) {
  if (!role) return 'Other';
  var en = (role.role_en || '').trim();
  var ge = (role.role_ge || '').trim();

  return en || ge || 'Other';
}

function parseStaffRoleIds(member) {
  if (!member.roles || !Array.isArray(member.roles)) return [];
  return member.roles.map(function(entry) {
    if (typeof entry === 'string') return entry;
    if (entry && entry.id) return entry.id;
    return null;
  }).filter(Boolean);
}

function getStaffPrimaryRoleId(member) {
  var ids = parseStaffRoleIds(member);
  var resolved = [];
  ids.forEach(function(id) {
    var role = allRolesLibrary.find(function(r) { return r.id === id; });
    if (role) resolved.push(role);
  });
  if (!resolved.length && member.role_en) {
    var roleEn = (member.role_en || '').split('|')[0].trim();
    var match = allRolesLibrary.find(function(r) { return r.role_en === roleEn; });
    if (match) resolved.push(match);
  }
  if (!resolved.length) return null;
  resolved.sort(function(a, b) { return (a.priority != null ? a.priority : 999) - (b.priority != null ? b.priority : 999); });
  return resolved[0].id;
}

function getStaffResolvedRoles(member) {
  var ids = parseStaffRoleIds(member);
  var resolved = [];
  ids.forEach(function(id) {
    var role = allRolesLibrary.find(function(r) { return r.id === id; });
    if (role) resolved.push(role);
  });
  if (!resolved.length && (member.role_en || member.role_ge)) {
    var roleEn = (member.role_en || '').split('|')[0].trim();
    var match = allRolesLibrary.find(function(r) { return r.role_en === roleEn; });
    if (match) resolved.push(match);
    else resolved.push({
      role_en: roleEn,
      role_ge: (member.role_ge || '').split('|')[0].trim(),
      badge_color: member.badge_color || '#8d6e63',
      badge_text_color: member.badge_text_color || '#ffffff'
    });
  }
  resolved.sort(function(a, b) { return (a.priority != null ? a.priority : 999) - (b.priority != null ? b.priority : 999); });
  return resolved;
}

      h += '<button class="btn btn-sm btn-danger" onclick="ds(\'' + s.id + '\',\'' + (s.photo_url || '') + '\')">Delete</button></div></div>';
    });
    h += '</div></div>';
  });
  if (groups.unassigned && groups.unassigned.length) {
    h += '<div class="staff-group-panel" style="background:#fff;border-radius:20px;padding:24px 32px;margin-bottom:32px"><h3 style="font-size:1.25rem;font-weight:700;color:var(--green-dark);margin-bottom:20px">Unassigned</h3><div style="display:flex;flex-wrap:wrap;gap:16px">';
    groups.unassigned.forEach(function(s) {
      h += '<div style="padding:16px;background:#f7f7f9;border-radius:16px"><strong>' + escHtmlAttr(s.name) + '</strong> <button class="btn btn-sm btn-primary" onclick="ssf(\'' + s.id + '\')">Edit</button></div>';
    });

function renderStaffRoleChips() {
  var container = document.getElementById('staffRoleChips');
  if (!container) return;
  if (!allRolesLibrary.length) {
    container.innerHTML = '<p style="color:var(--gray-600);font-size:.9rem">No roles defined yet. Add roles in the Roles section first.</p>';
    return;
  }
  var selectedRoles = allRolesLibrary.filter(function(r) { return staffSelectedRoleIds.indexOf(r.id) !== -1; });
  var availableRoles = allRolesLibrary.filter(function(r) { return staffSelectedRoleIds.indexOf(r.id) === -1; });
  var html = '<div class="staff-role-selector-wrapper">';
  if (selectedRoles.length) {
    html += '<div class="staff-role-chips">';
    selectedRoles.forEach(function(role) {
      html += '<span class="staff-role-chip" style="background:' + (role.badge_color || '#8d6e63') + ';color:' + (role.badge_text_color || '#fff') + '">';
      html += escHtmlAttr(formatRoleLabelAdmin(role));
      html += '<button type="button" class="staff-role-chip-remove" onclick="toggleStaffRoleChip(\'' + role.id + '\');event.stopPropagation();">&times;</button>';
      html += '</span>';
    });
    html += '</div>';
  }
  html += '<select class="form-control staff-role-add-select" onchange="onRoleSelect(this)">';
  html += '<option value="">' + (availableRoles.length ? 'Add role...' : 'All roles assigned') + '</option>';
  availableRoles.forEach(function(role) {
    html += '<option value="' + role.id + '">' + escHtmlAttr(formatRoleLabelAdmin(role)) + '</option>';
  });
  html += '</select></div>';
  container.innerHTML = html;
}

function onRoleSelect(select) {
  if (select.value) toggleStaffRoleChip(select.value);
}

function toggleStaffRoleChip(roleId) {
  var idx = staffSelectedRoleIds.indexOf(roleId);
  if (idx === -1) staffSelectedRoleIds.push(roleId);
  else staffSelectedRoleIds.splice(idx, 1);
  renderStaffRoleChips();
}

function renderMessages(c) {
  if (!messageCache.length) { c.innerHTML = '<div class="empty-state"><div class="icon">&#x2709;&#xFE0F;</div><p>No messages yet.</p></div>'; return; }
  var unread = messageCache.filter(function(m) { return !m.is_read; });
  var read = messageCache.filter(function(m) { return m.is_read; });
  var h = '<div style="display:flex;flex-direction:column;gap:16px">';
  h += '<div class="card"><div class="card-header"><h4>Unread <span class="badge" style="background:var(--blue);color:white;padding:2px 8px;border-radius:10px;font-size:.75rem;margin-left:8px">' + unread.length + '</span></h4></div><div class="card-body" style="padding:0">';
  if (!unread.length) { h += '<p class="empty-state" style="margin:0;padding:20px">No unread messages</p>'; }
  else { unread.forEach(function(m) { h += renderMessageItem(m); }); }
  h += '</div></div>';
  h += '<div class="card"><div class="card-header" onclick="toggleReadSection()" style="cursor:pointer;user-select:none"><h4>Read <span style="font-size:.8rem;color:var(--gray-500);margin-left:4px">(' + read.length + ')</span><span id="readToggleIcon" style="margin-left:8px;font-size:.75rem">&#x25BC;</span></h4></div>';
  h += '<div id="readMessagesSection" class="card-body" style="padding:0;display:none">';
  if (!read.length) { h += '<p class="empty-state" style="margin:0;padding:20px">No read messages</p>'; }
  else { read.forEach(function(m) { h += renderMessageItem(m); }); }
  h += '</div></div></div>';
  c.innerHTML = h;
}

async function rm(c) {
  var r = await supabaseClient.from('contact_messages').select('*').order('created_at', { ascending: false });
  if (r.error) { c.innerHTML = '<p class="empty-state">Error: ' + r.error.message + '</p>'; return; }
  messageCache = r.data || [];
  renderMessages(c);
}

function toggleMsg(el) { el.classList.toggle('expanded'); }

function toggleReadSection() {
  var section = document.getElementById('readMessagesSection');
  var icon = document.getElementById('readToggleIcon');
  if (!section) return;
  var isHidden = section.style.display === 'none';
  section.style.display = isHidden ? 'block' : 'none';
  if (icon) icon.innerHTML = isHidden ? '&#x25B2;' : '&#x25BC;';
}

async function markMessageRead(id, makeRead) {
  const { error } = await supabaseClient
    .from('contact_messages')
    .update({ is_read: makeRead })
    .eq('id', id);
  
  if (error) { showToast('Error: ' + error.message, 'error'); return; }
  
  for (var i = 0; i < messageCache.length; i++) {
    if (messageCache[i].id === id) { messageCache[i].is_read = makeRead; break; }
  }
  var content = document.getElementById('sectionContent');
  if (content) renderMessages(content);
  updateUnreadBadge();
}

async function dmsg(id) {
  sc('Delete Message?', 'This cannot be undone.', async function() {
    await supabaseClient.from('contact_messages').delete().eq('id', id);
    st('Deleted!');
    rs('messages');
  });
}

// ============================================================
// 6. CHATBOT KNOWLEDGE
// ============================================================
async function rcb(c) {
  var r = await supabaseClient.from('chatbot_knowledge').select('*').order('updated_at', { ascending: false });
  if (r.error) { c.innerHTML = '<p class="empty-state">Error: ' + r.error.message + '</p>'; return; }
  if (!r.data || !r.data.length) {
    c.innerHTML = '<div class="card"><div class="card-header"><h4>Chatbot Knowledge Base (Markdown)</h4></div><div class="card-body"><textarea class="form-control knowledge-textarea" id="kbText"></textarea><div class="form-actions" style="margin-top:12px"><button class="btn btn-primary" id="kbSaveBtn">Create</button></div></div></div>';
    document.getElementById('kbSaveBtn').onclick = async function() {
      var btn = this; setL(btn, true);
      try {
        var r = await supabaseClient.from('chatbot_knowledge').insert({ content: document.getElementById('kbText').value });
        if (r.error) { st('Error: ' + r.error.message, 'error'); } else { st('Created!'); rs('chatbot'); }
      } catch(e) { st('Error: ' + e.message, 'error'); }
      setL(btn, false);
    };
    return;
  }
  var kb = r.data[0];
  var h = '<div class="card"><div class="card-header"><h4>Chatbot Knowledge Base (Markdown)</h4></div><div class="card-body">';
  h += '<textarea class="form-control knowledge-textarea" id="kbText">' + (kb.content || '').replace(/</g, '<').replace(/>/g, '>') + '</textarea>';
  h += '<div class="form-actions" style="margin-top:12px"><button class="btn btn-primary" id="kbSaveBtn">Save</button></div>';
  h += '<p class="last-updated">Last updated: ' + new Date(kb.updated_at).toLocaleString() + '</p></div></div>';
  c.innerHTML = h;
  document.getElementById('kbSaveBtn').onclick = async function() {
    var btn = this; setL(btn, true);
    try {
      var r = await supabaseClient.from('chatbot_knowledge').update({ content: document.getElementById('kbText').value }).eq('id', kb.id);
      if (r.error) { st('Error: ' + r.error.message, 'error'); } else { st('Saved!'); rs('chatbot'); }
    } catch(e) { st('Error: ' + e.message, 'error'); }
    setL(btn, false);
  };
}

// ============================================================
// 7. SITE SETTINGS
// ============================================================
async function rset(c) {
  var r = await supabaseClient.from('site_settings').select('*');
  if (r.error) { c.innerHTML = '<p class="empty-state">Error: ' + r.error.message + '</p>'; return; }
  var s = (r.data && r.data.length) ? r.data[0] : { id: null, email: '', phone: '', address: '', mission_en: '', mission_ge: '', updated_at: null };
  var esc = function(v) { return (v || '').replace(/"/g, '&quot;'); };
  var h = '<div class="card"><div class="card-header"><h4>Site Settings</h4></div><div class="card-body">';
  h += '<div class="settings-grid">';
  h += '<div class="settings-section"><h4>Contact Info</h4>';
  h += '<div class="form-group"><label>Email</label><input class="form-control" id="sEmail" value="' + esc(s.email) + '"></div>';
  h += '<div class="form-group"><label>Phone</label><input class="form-control" id="sPhone" value="' + esc(s.phone) + '"></div>';
  h += '<div class="form-group"><label>Address</label><input class="form-control" id="sAddress" value="' + esc(s.address) + '"></div>';
  h += '</div><div class="settings-section"><h4>Mission Statement</h4>';
  h += '<div class="form-group"><label>Mission (EN)</label><textarea class="form-control" id="sMissionEn" style="min-height:80px;">' + esc(s.mission_en) + '</textarea></div>';
  h += '<div class="form-group"><label>Mission (GE)</label><textarea class="form-control" id="sMissionGe" style="min-height:80px;">' + esc(s.mission_ge) + '</textarea></div>';
  h += '</div></div>';
  h += '<div class="form-actions"><button class="btn btn-primary" id="sSaveBtn">Save Settings</button></div>';
  if (s.updated_at) {
    h += '<p class="last-updated">Last updated: ' + new Date(s.updated_at).toLocaleString() + '</p>';
  }
  h += '</div></div>';
  c.innerHTML = h;
  document.getElementById('sSaveBtn').onclick = async function() {
    var btn = this; setL(btn, true);
    try {
      var data = {
        email: document.getElementById('sEmail').value.trim(),
        phone: document.getElementById('sPhone').value.trim(),
        address: document.getElementById('sAddress').value.trim(),
        mission_en: document.getElementById('sMissionEn').value.trim(),
        mission_ge: document.getElementById('sMissionGe').value.trim(),
        updated_at: new Date().toISOString()
      };
      var res;
      if (s.id) {
        res = await supabaseClient.from('site_settings').update(data).eq('id', s.id);
      } else {
        res = await supabaseClient.from('site_settings').insert(data);
      }
      if (res.error) { st('Error: ' + res.error.message, 'error'); } else { st('Settings saved!'); rs('settings'); }
    } catch(e) { st('Error: ' + e.message, 'error'); }
    setL(btn, false);
  };
}

// ============================================================
// Roles drag-and-drop reordering
// ============================================================
function handleRoleDragStart(ev) {
  var item = ev.target.closest('.role-order-item');
  if (!item) return;
  roleDragSrcId = item.getAttribute('data-role-id');
  ev.dataTransfer.effectAllowed = 'move';
  ev.dataTransfer.setData('text/plain', roleDragSrcId);
  item.classList.add('dragging');
}

function handleRoleDragOver(ev) {
  ev.preventDefault();
  ev.dataTransfer.dropEffect = 'move';
  var item = ev.target.closest('.role-order-item');
  if (item && item.getAttribute('data-role-id') !== roleDragSrcId) {
    item.classList.add('drag-over');
  }
}

function handleRoleDragLeave(ev) {
  var item = ev.target.closest('.role-order-item');
  if (item) item.classList.remove('drag-over');
}

function handleRoleDrop(ev) {
  ev.preventDefault();
  var targetItem = ev.target.closest('.role-order-item');
  if (!targetItem) return;
  targetItem.classList.remove('drag-over');
  var targetId = targetItem.getAttribute('data-role-id');
  if (!roleDragSrcId || roleDragSrcId === targetId) return;
  var srcIdx = -1, tgtIdx = -1;
  for (var i = 0; i < allRolesLibrary.length; i++) {
    if (allRolesLibrary[i].id === roleDragSrcId) srcIdx = i;
    if (allRolesLibrary[i].id === targetId) tgtIdx = i;
  }
  if (srcIdx === -1 || tgtIdx === -1) return;
  var item = allRolesLibrary.splice(srcIdx, 1)[0];
  allRolesLibrary.splice(tgtIdx, 0, item);
  saveRolePriorities();
}

function handleRoleDragEnd(ev) {
  var item = ev.target.closest('.role-order-item');
  if (item) item.classList.remove('dragging');
  var overs = document.querySelectorAll('.role-order-item.drag-over');
  for (var i = 0; i < overs.length; i++) { overs[i].classList.remove('drag-over'); }
  roleDragSrcId = null;
}

async function saveRolePriorities() {
  for (var i = 0; i < allRolesLibrary.length; i++) {
    var r = await supabaseClient.from('roles').update({ priority: i + 1 }).eq('id', allRolesLibrary[i].id);
    if (r.error) { st('Error saving priorities: ' + r.error.message, 'error'); return; }
  }
  for (var i = 0; i < allRolesLibrary.length; i++) { allRolesLibrary[i].priority = i + 1; }
  st('Priorities saved!');
  rs('roles');
}

// Aliases for minified function names used by appended code sections
function st(m,t) { showToast(m,t); }
function cm() { closeModal(); }
function om(t) { openModal(t); }
function rs(s) { renderSection(s); }
async function ui(f) { return uploadImage(f); }
async function di(u) { deleteImage(u); }
function sc(t,m,c) { showConfirm(t,m,c); }
function cfu(u,f) { return createFileUpload(u,f); }
function setL(b,l) { setLoading(b,l); }
